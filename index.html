<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM 라디오 모음</title>
    <meta name="description" content="KBS, MBC, SBS와 주요 FM 라디오를 한 화면에서 바로 재생하는 FM 라디오 모음">
    <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17"></script>
    <style>
        :root {
            --bg: #121110;
            --bg-soft: #1c1917;
            --panel: rgba(30, 27, 24, 0.9);
            --panel-soft: rgba(255, 248, 240, 0.05);
            --line: rgba(255, 244, 232, 0.1);
            --text: #f7f0e7;
            --muted: #b9aea1;
            --accent: #d36a42;
            --accent-strong: #ec8255;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at top, rgba(211, 106, 66, 0.14), transparent 28%),
                linear-gradient(180deg, #201a16 0%, #131110 30%, #0d0d0d 100%);
            color: var(--text);
            min-height: 100vh;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
            background: none;
            color: inherit;
        }

        button:focus-visible,
        input:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.9);
            outline-offset: 3px;
        }

        .page-shell {
            width: min(1040px, calc(100% - 28px));
            margin: 0 auto;
            padding: 18px 0 40px;
        }

        .hero-visual {
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: var(--shadow);
            background:
                linear-gradient(180deg, rgba(18, 17, 16, 0.92), rgba(18, 17, 16, 0.74)),
                #2a2623;
            margin-bottom: 18px;
            min-height: 248px;
        }

        .site-banner {
            width: 100%;
            display: block;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            filter: saturate(0.8) sepia(0.18) contrast(1.02);
        }

        .hero-player-wrap {
            position: absolute;
            left: 24px;
            right: 24px;
            bottom: 24px;
        }

        .player-bar {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 12px 14px;
            border-radius: var(--radius-lg);
            background: rgba(23, 20, 18, 0.68);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(14px);
        }

        .player-main {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .btn-play-main {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            background: radial-gradient(circle at 30% 30%, var(--accent-strong), var(--accent) 62%, #9c492d 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.28),
                0 8px 18px rgba(211, 106, 66, 0.26);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-play-main:hover {
            transform: translateY(-1px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                0 15px 28px rgba(211, 106, 66, 0.34);
        }

        .btn-play-main:active {
            transform: scale(0.98);
        }

        .now-label {
            color: #dfb287;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 4px;
        }

        .now-station {
            font-size: 1.02rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-subtext {
            margin-top: 3px;
            color: var(--muted);
            font-size: 0.84rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 999px;
            background: var(--panel-soft);
        }

        .volume-control svg {
            width: 18px;
            height: 18px;
            fill: #e2d7ca;
            flex-shrink: 0;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 104px;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), rgba(255, 255, 255, 0.18));
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #fff8f0;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #fff8f0;
            cursor: pointer;
        }

        main {
            display: grid;
            gap: 16px;
        }

        .group {
            border-radius: var(--radius-lg);
            padding: 20px;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }

        .group-title {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .group-note {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .station-list {
            display: grid;
            gap: 10px;
        }

        .station {
            width: 100%;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 14px;
            padding: 14px;
            border-radius: var(--radius-md);
            text-align: left;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }

        .station:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .station.active {
            background: linear-gradient(135deg, rgba(211, 106, 66, 0.15), rgba(255, 255, 255, 0.04));
            border-color: rgba(211, 106, 66, 0.34);
        }

        .station-icon {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff8f2;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            flex-shrink: 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .station-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #f4eee7;
        }

        .station-desc {
            font-size: 0.88rem;
            color: var(--muted);
            margin-top: 5px;
        }

        .station-status {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 28px;
        }

        .station-eq {
            display: none;
            gap: 3px;
            align-items: flex-end;
            height: 18px;
        }

        .station.active .station-eq {
            display: flex;
        }

        .station.active.playing .station-eq .eq-bar {
            animation-play-state: running;
        }

        .eq-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 999px;
            animation: eq 0.8s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 14px; animation-delay: 0.18s; }
        .eq-bar:nth-child(3) { height: 8px; animation-delay: 0.36s; }
        .eq-bar:nth-child(4) { height: 16px; animation-delay: 0.12s; }

        @keyframes eq {
            0% { height: 4px; opacity: 0.56; }
            100% { height: 18px; opacity: 1; }
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(211, 106, 66, 0.2);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .station.loading .loading-spinner {
            display: block;
        }

        .station.loading .station-eq {
            display: none !important;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 720px) {
            .page-shell {
                width: min(100% - 18px, 100%);
                padding-top: 10px;
            }

            .site-banner {
                border-radius: 0;
            }

            .hero-visual {
                border-radius: 18px;
                min-height: 198px;
            }

            .hero-player-wrap {
                left: 12px;
                right: 12px;
                bottom: 14px;
            }

            .player-bar {
                grid-template-columns: 1fr;
                align-items: stretch;
                gap: 10px;
                padding: 12px;
            }

            .player-subtext {
                white-space: normal;
            }

            .volume-control {
                justify-content: center;
            }

            .volume-slider {
                width: min(180px, 100%);
            }

            .group {
                padding: 16px;
            }

            .station {
                grid-template-columns: auto minmax(0, 1fr);
            }

            .station-status {
                grid-column: 2;
                justify-content: flex-start;
                margin-top: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <section class="hero-visual" aria-label="튜너 이미지와 상태 창">
            <img class="site-banner" src="t2.png" alt="Yamaha Natural Sound FM Stereo Tuner T-2 전면 패널">
            <div class="hero-player-wrap">
                <section class="player-bar" aria-label="현재 재생 플레이어">
                    <div class="player-main">
                        <button class="btn-play-main" id="btnPlay" type="button" aria-label="재생 또는 일시정지" onclick="togglePlay()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path id="playIcon" d="M8 5v14l11-7z"></path>
                            </svg>
                        </button>
                        <div class="now-playing">
                            <div class="now-label">Now Playing</div>
                            <div class="now-station" id="nowStation">방송을 선택하세요</div>
                            <div class="player-subtext" id="playerSubtext">원하는 채널을 누르면 바로 연결을 시도합니다.</div>
                        </div>
                    </div>
                    <label class="volume-control" for="volumeSlider">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"></path></svg>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" aria-label="볼륨" oninput="setVolume(this.value)">
                    </label>
                </section>
            </div>
        </section>

        <main>
            <section class="group">
                <div class="group-header">
                    <div class="group-title">KBS</div>
                    <div class="group-note">5개 채널</div>
                </div>
                <div class="station-list" id="kbsList"></div>
            </section>

            <section class="group">
                <div class="group-header">
                    <div class="group-title">CBS</div>
                    <div class="group-note">2개 채널</div>
                </div>
                <div class="station-list" id="cbsList"></div>
            </section>

            <section class="group">
                <div class="group-header">
                    <div class="group-title">SBS</div>
                    <div class="group-note">2개 채널</div>
                </div>
                <div class="station-list" id="sbsList"></div>
            </section>

            <section class="group">
                <div class="group-header">
                    <div class="group-title">기타</div>
                    <div class="group-note">4개 채널</div>
                </div>
                <div class="station-list" id="etcList"></div>
            </section>
        </main>

    </div>

    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <script>
        const stations = [
            { id: "kbs1fm", name: "KBS 1FM", desc: "클래식 FM", group: "kbs", color: "#7b6a57", type: "kbs-api", apiUrl: "https://cfpwwwapi.kbs.co.kr/api/v1/landing/live/channel_code/24" },
            { id: "kbs2fm", name: "KBS 2FM", desc: "Cool FM", group: "kbs", color: "#9b5d44", type: "kbs-api", apiUrl: "https://cfpwwwapi.kbs.co.kr/api/v1/landing/live/channel_code/25" },
            { id: "kbs1r", name: "KBS 1라디오", desc: "뉴스·시사", group: "kbs", color: "#5d6877", type: "kbs-api", apiUrl: "https://cfpwwwapi.kbs.co.kr/api/v1/landing/live/channel_code/21" },
            { id: "kbs2r", name: "KBS 2라디오", desc: "해피FM", group: "kbs", color: "#8a4335", type: "kbs-api", apiUrl: "https://cfpwwwapi.kbs.co.kr/api/v1/landing/live/channel_code/22" },
            { id: "kbs3r", name: "KBS 3라디오", desc: "사회교육방송", group: "kbs", color: "#596f6a", type: "kbs-api", apiUrl: "https://cfpwwwapi.kbs.co.kr/api/v1/landing/live/channel_code/23" },
            { id: "cbsstd", name: "CBS 표준FM", desc: "98.1MHz", group: "cbs", color: "#6d7f49", type: "direct", streamUrl: "https://m-aac.cbs.co.kr/mweb_cbs981/_definst_/cbs981.stream/playlist.m3u8" },
            { id: "cbsmusic", name: "CBS 음악FM", desc: "93.9MHz", group: "cbs", color: "#5c6f8d", type: "direct", streamUrl: "https://m-aac.cbs.co.kr/mweb_cbs939/_definst_/cbs939.stream/playlist.m3u8" },
            { id: "sbslove", name: "SBS 러브FM", desc: "103.5MHz", group: "sbs", color: "#5e667d", type: "sbs-api", apiUrl: "https://apis.sbs.co.kr/play-api/1.0/livestream/lovepc/lovefm?protocol=hls&ssl=Y" },
            { id: "sbspower", name: "SBS 파워FM", desc: "107.7MHz", group: "sbs", color: "#6e7b98", type: "sbs-api", apiUrl: "https://apis.sbs.co.kr/play-api/1.0/livestream/powerpc/powerfm?protocol=hls&ssl=Y" },
            { id: "ebsfm", name: "EBS FM", desc: "104.5MHz", group: "etc", color: "#65735d", type: "direct", streamUrl: "https://ebsonair.ebs.co.kr/fmradiofamilypc/familypc1m/playlist.m3u8" },
            { id: "ytn", name: "YTN 라디오", desc: "94.5MHz", group: "etc", color: "#9b6e34", type: "direct", streamUrl: "https://radiolive.ytn.co.kr/radio/_definst_/20211118_fmlive/playlist.m3u8" },
            { id: "gugak", name: "국악방송", desc: "99.1MHz", group: "etc", color: "#7d5b78", type: "direct", streamUrl: "https://mgugaklive.nowcdn.co.kr/gugakradio/gugakradio.stream/playlist.m3u8" },
            { id: "febc", name: "극동방송", desc: "FEBC Seoul", group: "etc", color: "#8b5d3f", type: "direct", streamUrl: "https://mlive3.febc.net/live5/mplive/playlist.m3u8" }
        ];

        const audio = document.getElementById("audioPlayer");
        const playIcon = document.getElementById("playIcon");
        const nowStation = document.getElementById("nowStation");
        const playerSubtext = document.getElementById("playerSubtext");

        let currentStation = null;
        let isPlaying = false;
        let hls = null;

        audio.volume = 0.8;

        function stationInitial(name) {
            const lastWord = name.split(" ").pop() || name;
            return lastWord.substring(0, 4).toUpperCase();
        }

        function renderStations() {
            const groups = { kbs: "kbsList", cbs: "cbsList", sbs: "sbsList", etc: "etcList" };

            for (const [group, listId] of Object.entries(groups)) {
                const list = document.getElementById(listId);
                const groupStations = stations.filter((station) => station.group === group);
                list.innerHTML = groupStations.map((station) => `
                    <button class="station" id="st-${station.id}" type="button" onclick="selectStation('${station.id}')">
                        <div class="station-icon" style="background:${station.color}">${stationInitial(station.name)}</div>
                        <div class="station-info">
                            <div class="station-name">${station.name}</div>
                            <div class="station-desc">${station.desc}</div>
                        </div>
                        <div class="station-status">
                            <div class="loading-spinner" aria-hidden="true"></div>
                            <div class="station-eq" aria-hidden="true">
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                                <div class="eq-bar"></div>
                            </div>
                        </div>
                    </button>
                `).join("");
            }
        }

        async function getStreamUrl(station) {
            if (station.type === "direct") {
                return station.streamUrl;
            }

            const response = await fetch(station.apiUrl);

            if (station.type === "kbs-api") {
                const data = await response.json();
                if (data.channel_item && data.channel_item.length > 0) {
                    return data.channel_item[0].service_url;
                }
                throw new Error("KBS 스트림 URL을 가져올 수 없습니다");
            }

            if (station.type === "sbs-api") {
                const url = (await response.text()).trim();
                if (url.startsWith("http")) {
                    return url;
                }
                throw new Error("스트림 URL을 가져올 수 없습니다");
            }

            throw new Error("알 수 없는 스트림 타입");
        }

        function applyStationTheme(station) {
            const accent = station ? station.color : "#d36a42";
            document.documentElement.style.setProperty("--accent", accent);
            document.documentElement.style.setProperty("--accent-strong", lightenColor(accent, 18));
        }

        function lightenColor(hex, amount) {
            const sanitized = hex.replace("#", "");
            const num = parseInt(sanitized, 16);
            const r = Math.min(255, (num >> 16) + amount);
            const g = Math.min(255, ((num >> 8) & 0x00ff) + amount);
            const b = Math.min(255, (num & 0x0000ff) + amount);
            return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, "0")}`;
        }

        function playStream(url) {
            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (typeof Hls !== "undefined" && Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true
                });
                hls.loadSource(url);
                hls.attachMedia(audio);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    audio.play().catch(() => {
                        isPlaying = false;
                        updatePlayButton();
                    });
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            hls.startLoad();
                        } else {
                            stopPlay();
                        }
                    }
                });
            } else if (audio.canPlayType("application/vnd.apple.mpegurl")) {
                audio.src = url;
                audio.play().catch(() => {
                    isPlaying = false;
                    updatePlayButton();
                });
            } else {
                alert("이 브라우저는 HLS 스트리밍을 지원하지 않습니다.");
            }
        }

        async function selectStation(id) {
            const station = stations.find((item) => item.id === id);
            if (!station) return;

            document.querySelectorAll(".station").forEach((element) => {
                element.classList.remove("active", "playing", "loading");
            });

            const stationElement = document.getElementById(`st-${id}`);
            stationElement.classList.add("active", "loading");
            currentStation = station;
            nowStation.textContent = station.name;
            playerSubtext.textContent = `${station.desc} 스트림에 연결 중입니다.`;
            applyStationTheme(station);

            try {
                const url = await getStreamUrl(station);
                stationElement.classList.remove("loading");
                stationElement.classList.add("playing");
                playStream(url);
                isPlaying = true;
                updatePlayButton();
            } catch (error) {
                stationElement.classList.remove("loading");
                nowStation.textContent = `${station.name} 연결 실패`;
                playerSubtext.textContent = "스트림 응답이 없거나 브라우저 정책 때문에 재생이 차단되었습니다.";
                console.error(error);
            }
        }

        function togglePlay() {
            if (!currentStation) return;

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playerSubtext.textContent = `${currentStation.name} 재생을 일시정지했습니다.`;
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                    playerSubtext.textContent = `${currentStation.name} 재생 중입니다.`;
                    updatePlayButton();
                    updateActiveStation();
                }).catch(() => {
                    isPlaying = false;
                    playerSubtext.textContent = "브라우저가 재생을 차단했습니다. 다시 시도해 주세요.";
                    updatePlayButton();
                });
                return;
            }

            updatePlayButton();
            updateActiveStation();
        }

        function stopPlay() {
            if (hls) {
                hls.destroy();
                hls = null;
            }

            audio.pause();
            audio.src = "";
            isPlaying = false;
            updatePlayButton();
            updateActiveStation();
        }

        function updatePlayButton() {
            if (isPlaying) {
                playIcon.setAttribute("d", "M6 19h4V5H6v14zm8-14v14h4V5h-4z");
            } else {
                playIcon.setAttribute("d", "M8 5v14l11-7z");
            }
        }

        function updateActiveStation() {
            document.querySelectorAll(".station").forEach((element) => {
                element.classList.remove("playing");
            });

            if (currentStation && isPlaying) {
                const element = document.getElementById(`st-${currentStation.id}`);
                if (element) element.classList.add("playing");
            }
        }

        function setVolume(value) {
            audio.volume = value / 100;
        }

        audio.addEventListener("pause", () => {
            isPlaying = false;
            updatePlayButton();
            updateActiveStation();
        });

        audio.addEventListener("playing", () => {
            isPlaying = true;
            updatePlayButton();
            updateActiveStation();
            if (currentStation) {
                playerSubtext.textContent = `${currentStation.name} 재생 중입니다.`;
            }
        });

        renderStations();
    </script>
</body>
</html>

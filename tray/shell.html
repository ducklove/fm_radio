<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mad for Audio 트레이</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0a09;
            font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        }

        iframe {
            display: block;
            border: 0;
            width: 100%;
            height: 100%;
        }

        /* 슬림 '나우 플레잉' 바 — 재생 중 창을 닫으면 iframe 위를 덮어 곡명+재생/정지만 남긴다.
           iframe은 display를 끄지 않고 뒤에 살려 둔다(오디오 유지). */
        #miniBar {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 12px;
            color: #f2e3c8;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0) 40%),
                linear-gradient(180deg, #2b2723 0%, #1a1613 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), inset 0 -2px 6px rgba(0, 0, 0, 0.5);
            -webkit-app-region: drag;
        }

        #miniBar[hidden] {
            display: none;
        }

        #miniPlay {
            -webkit-app-region: no-drag;
            flex-shrink: 0;
            width: 34px;
            height: 34px;
            border: 1px solid #0d0b09;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f0c064;
            background: radial-gradient(circle at 32% 28%, #5a5249, #2e2a24 58%, #171310 100%);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.25), 0 3px 7px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        #miniPlay:active {
            transform: scale(0.96);
        }

        #miniPlay svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        #miniText {
            -webkit-app-region: no-drag;
            min-width: 0;
            flex: 1;
            cursor: pointer;
        }

        #miniStation {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #miniStatus {
            margin-top: 1px;
            font-size: 0.68rem;
            color: #a3937d;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #miniExpand {
            -webkit-app-region: no-drag;
            flex-shrink: 0;
            color: #a3937d;
            font-size: 0.7rem;
            background: none;
            border: 0;
            cursor: pointer;
        }

        #miniExpand:hover {
            color: #f2e3c8;
        }

        /* 작업표시줄 스트립(≈48px)에 도킹될 때: 곡명(채널명)과 재생/정지만 남긴 컴팩트 배치 */
        @media (max-height: 52px) {
            #miniBar {
                gap: 8px;
                padding: 0 10px;
            }

            #miniPlay {
                width: 28px;
                height: 28px;
            }

            #miniPlay svg {
                width: 14px;
                height: 14px;
            }

            #miniStation {
                font-size: 0.78rem;
            }

            #miniStatus {
                display: none;
            }

            #miniExpand {
                font-size: 0.66rem;
            }
        }
    </style>
</head>
<body>
    <!-- 재생 엔진: 튜너형은 로컬 widget.html, 오디오 시스템은 배포판 index.html — postMessage API를 IPC로 중계.
         fullscreen 허용: 랙의 '⛶ 전체 화면(몰입)' 버튼이 트레이 안에서도 동작하게.
         file://↔https 교차 출처라 기본(src) 위임이 매칭되지 않아 *로 명시한다 -->
    <iframe id="widgetFrame" allow="autoplay *; fullscreen *" allowfullscreen></iframe>

    <div id="miniBar" hidden>
        <button id="miniPlay" type="button" aria-label="재생 또는 일시정지">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path id="miniPlayIcon" d="M8 5v14l11-7z"></path></svg>
        </button>
        <div id="miniText" role="button" tabindex="0" title="클릭하면 플레이어를 펼칩니다">
            <div id="miniStation">Mad for Audio</div>
            <div id="miniStatus">정지</div>
        </div>
        <button id="miniExpand" type="button" title="플레이어 펼치기" aria-label="플레이어 펼치기">펼치기 ▸</button>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const TUNER_URL = params.get("tuner");
        const SYSTEM_URL = params.get("system");

        let frame = document.getElementById("widgetFrame");
        const miniBar = document.getElementById("miniBar");
        const miniPlay = document.getElementById("miniPlay");
        const miniPlayIcon = document.getElementById("miniPlayIcon");
        const miniStation = document.getElementById("miniStation");
        const miniStatus = document.getElementById("miniStatus");
        const miniText = document.getElementById("miniText");
        const miniExpand = document.getElementById("miniExpand");

        const STATE_MESSAGE_TYPES = new Set(["fmRadio:ready", "fmRadio:state", "fmRadio:ended"]);
        const LOOPBACK_HOSTS = new Set(["127.0.0.1", "localhost", "[::1]"]);

        let currentView = null;
        let loadGeneration = 0;
        let activeLoad = null;
        let lastState = null;

        function parseFrameTarget(rawUrl) {
            const url = new URL(rawUrl);
            const isOpaqueFile = url.protocol === "file:";
            const isRemoteHttps = url.protocol === "https:";
            const isLocalHttp = url.protocol === "http:" && LOOPBACK_HOSTS.has(url.hostname);
            if (!isOpaqueFile && !isRemoteHttps && !isLocalHttp) {
                throw new TypeError(`허용되지 않은 프레임 URL: ${url.protocol}`);
            }
            return {
                url,
                origin: isOpaqueFile ? "null" : url.origin,
                opaque: isOpaqueFile
            };
        }

        function createLoadNonce() {
            return crypto.randomUUID();
        }

        function loadView(view) {
            const rawUrl = view === "system" ? SYSTEM_URL : TUNER_URL;
            let target;
            try {
                target = parseFrameTarget(rawUrl);
            } catch (error) {
                console.error("트레이 보기를 열 수 없습니다.", error);
                return false;
            }

            const generation = ++loadGeneration;
            const nonce = createLoadNonce();
            target.url.searchParams.set("shellGeneration", String(generation));
            target.url.searchParams.set("nonce", nonce);

            // WindowProxy는 같은 iframe의 탐색에서 재사용된다. 노드 자체를 교체해야
            // 이전 문서가 큐에 넣은 메시지를 현재 로드의 메시지로 오인하지 않는다.
            const previousFrame = frame;
            const nextFrame = previousFrame.cloneNode(false);
            nextFrame.dataset.loadGeneration = String(generation);
            frame = nextFrame;
            activeLoad = {
                frame: nextFrame,
                generation,
                nonce,
                origin: target.origin,
                targetOrigin: target.opaque ? "*" : target.origin,
                // widget.html은 nonce를 왕복한다. 전체 랙은 기존 계약상 nonce 없이
                // 상태를 보내므로 교체된 WindowProxy + origin 경계로 격리한다.
                requiresNonce: view === "tuner"
            };
            previousFrame.replaceWith(nextFrame);
            nextFrame.src = target.url.href;
            currentView = view;
            return true;
        }

        function postToFrame(message) {
            const load = activeLoad;
            if (!load || !load.frame.contentWindow) return;
            load.frame.contentWindow.postMessage(Object.assign({}, message, {
                nonce: load.nonce,
                shellGeneration: load.generation
            }), load.targetOrigin);
        }

        function setView(view) {
            const next = view === "system" ? "system" : "tuner";
            if (next === currentView) return;
            if (loadView(next)) trayBridge.sendView(next);
        }

        function applyMode(mode) {
            miniBar.hidden = mode !== "bar";
        }

        function updateMini(state) {
            miniStation.textContent = state.stationName || (state.title || "Mad for Audio");
            miniStatus.textContent = state.loading ? "연결 중…" : state.playing ? "재생 중" : "정지";
            miniPlayIcon.setAttribute("d", state.playing ? "M6 19h4V5H6v14zm8-14v14h4V5h-4z" : "M8 5v14l11-7z");
        }

        // iframe(위젯/랙) → 셸
        window.addEventListener("message", (event) => {
            const load = activeLoad;
            const data = event.data;
            if (!data || typeof data.type !== "string" || !data.type.startsWith("fmRadio:")) return;
            if (!load || event.source !== load.frame.contentWindow) return;
            if (event.origin !== load.origin) return;
            if (data.nonce !== undefined && data.nonce !== load.nonce) return;
            if (load.requiresNonce && data.nonce !== load.nonce) return;
            if (data.type === "fmRadio:openView") {
                setView(data.view);
                return;
            }
            if (!STATE_MESSAGE_TYPES.has(data.type)) return;
            lastState = data;
            updateMini(data);
            trayBridge.sendState(data);
        });

        loadView("tuner");

        // 메인 프로세스 → 셸
        trayBridge.onCommand((message) => {
            if (!message || typeof message !== "object") return;
            if (typeof message.trayMode === "string") {
                applyMode(message.trayMode);
                return;
            }
            if (typeof message.setView === "string") {
                setView(message.setView);
                return;
            }
            postToFrame(message);
        });

        miniPlay.addEventListener("click", () => postToFrame({ type: "fmRadio:toggle" }));
        miniText.addEventListener("click", () => trayBridge.requestFull());
        miniText.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                trayBridge.requestFull();
            }
        });
        miniExpand.addEventListener("click", () => trayBridge.requestFull());
    </script>
</body>
</html>
